; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:genericSTM32F411RE]
platform = ststm32
board = genericSTM32F411RE
framework = arduino
upload_protocol = stlink
monitor_speed = 115200
build_flags = -Wl,-u,_printf_float

; EK-TM4C129EXL (TM4C129EXNCZAD, 120 MHz Cortex-M4F)
; Naechstliegendes verfuegbares Board-Profil: lptm4c1294ncpdt (gleicher Kern + ADC/SPI)
; Upload: USB-Debugger auf dem Board (XDS110), kein externer Programmer noetig
[env:lptm4c1294ncpdt]
platform = titiva
board = lptm4c1294ncpdt
framework = arduino
monitor_speed = 921600
build_flags = -DBOARD_TM4C129EXL
lib_ignore = AIR430BoostEuropeETSI, AIR430BoostUSAFCC
extra_scripts = fix_upload.py
